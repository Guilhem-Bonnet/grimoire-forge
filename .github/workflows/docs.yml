name: Deploy Forge docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs-material>=9.5" "pymdown-extensions>=10.0"

      - name: Build site
        run: mkdocs build --clean

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Pages is enabled
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPO}/pages"
          payload='{"build_type":"workflow"}'
          status=$(curl -sS -o /tmp/pages-response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" \
            -d "$payload")

          if [[ "$status" == "201" || "$status" == "409" ]]; then
            echo "Pages API status: $status"
            exit 0
          fi

          echo "Pages activation failed with status: $status"
          cat /tmp/pages-response.json
          exit 1

      - id: deployment
        uses: actions/deploy-pages@v4
