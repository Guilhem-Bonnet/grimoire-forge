# CI — Grimoire Kit
# Valide les scripts bash du framework à chaque push/PR sur main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck — scripts framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint grimoire-init.sh
        run: |
          [ -f grimoire-kit/grimoire-init.sh ] || { echo "grimoire-kit absent dans ce checkout — skip"; exit 0; }
          shellcheck -S warning grimoire-kit/grimoire-init.sh

      - name: Lint framework scripts
        run: |
          [ -f grimoire-kit/grimoire-init.sh ] || { echo "grimoire-kit absent dans ce checkout — skip"; exit 0; }
          shellcheck -S warning grimoire-kit/framework/cc-verify.sh
          shellcheck -S warning grimoire-kit/framework/sil-collect.sh
          shellcheck -S warning grimoire-kit/framework/hooks/pre-commit-cc.sh

  syntax-check:
    name: Syntax bash — validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bash syntax
        run: |
          [ -f grimoire-kit/grimoire-init.sh ] || { echo "grimoire-kit absent dans ce checkout — skip"; exit 0; }
          bash -n grimoire-kit/grimoire-init.sh && echo "✅ grimoire-init.sh"
          bash -n grimoire-kit/framework/cc-verify.sh && echo "✅ cc-verify.sh"
          bash -n grimoire-kit/framework/sil-collect.sh && echo "✅ sil-collect.sh"
          bash -n grimoire-kit/framework/hooks/pre-commit-cc.sh && echo "✅ pre-commit-cc.sh"

  smoke-test:
    name: Smoke test — grimoire-init.sh --help
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test --help flag
        run: |
          [ -f grimoire-kit/grimoire-init.sh ] || { echo "grimoire-kit absent dans ce checkout — skip"; exit 0; }
          bash grimoire-kit/grimoire-init.sh --help

      - name: Test detect_stack sur le repo lui-même
        run: |
          [ -f grimoire-kit/grimoire-init.sh ] || { echo "grimoire-kit absent dans ce checkout — skip"; exit 0; }
          source <(sed -n '/^detect_stack/,/^}/p' grimoire-kit/grimoire-init.sh)
          stacks=$(detect_stack "$(pwd)/grimoire-kit")
          echo "Stacks détectés : $stacks"
          [[ -n "$stacks" ]] && echo "✅ detect_stack OK" || echo "⚠️  Aucun stack détecté"

  python-quality:
    name: Python quality - grimoire-kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect grimoire-kit Python package
        id: python_scope
        run: |
          if [[ -f grimoire-kit/pyproject.toml ]]; then
            echo "run_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_check=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.python_scope.outputs.run_check == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.python_scope.outputs.run_check == 'true'
        run: |
          cd grimoire-kit
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov ruff "mcp>=1.0"

      - name: Run Ruff
        if: steps.python_scope.outputs.run_check == 'true'
        run: |
          cd grimoire-kit
          python -m ruff check framework/tools/ tests/ --statistics

      - name: Run tests with coverage
        if: steps.python_scope.outputs.run_check == 'true'
        run: |
          cd grimoire-kit
          python -m pytest tests/ \
            --cov=src/grimoire \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --ignore=tests/test_background_tasks.py

      - name: Upload coverage reports to Codecov
        if: steps.python_scope.outputs.run_check == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: grimoire-kit/coverage.xml
          flags: grimoire-kit
          name: grimoire-kit-py312

      - name: Skip notice
        if: steps.python_scope.outputs.run_check != 'true'
        run: echo "grimoire-kit absent dans ce checkout, checks Python skips."

  visual-evidence-governance:
    name: Visual evidence governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect visual scope changes
        id: visual_scope
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            DIFF_BASE="origin/${{ github.base_ref }}"
          else
            DIFF_BASE="HEAD~1"
          fi
          git diff --name-only "$DIFF_BASE" HEAD > changed.txt
          if grep -E '^_grimoire-runtime-output/implementation-artifacts/(visual-brief\.md|brand-board\.md|ux-map\.md|motion-spec\.md|assets-manifest\.csv|implementation-pack/|proof-pack\.md|visual-evidence/)' changed.txt >/dev/null; then
            echo "run_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_check=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run visual evidence checks
        if: steps.visual_scope.outputs.run_check == 'true'
        run: |
          python grimoire-kit/framework/tools/visual-evidence-governance.py \
            --project-root . \
            check

      - name: Skip notice
        if: steps.visual_scope.outputs.run_check != 'true'
        run: echo "No visual-scope changes detected, visual governance check skipped."

  grimoire-game-quality:
    name: Grimoire Game quality - Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Grimoire Game package
        id: game_scope
        run: |
          if [[ -f grimoire-kit/apps/grimoire-game/package-lock.json ]]; then
            echo "run_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_check=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.game_scope.outputs.run_check == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: grimoire-kit/apps/grimoire-game/package-lock.json

      - name: Install dependencies
        if: steps.game_scope.outputs.run_check == 'true'
        run: cd grimoire-kit/apps/grimoire-game && npm ci

      - name: Type check
        if: steps.game_scope.outputs.run_check == 'true'
        run: cd grimoire-kit/apps/grimoire-game && npm run check

      - name: Build package
        if: steps.game_scope.outputs.run_check == 'true'
        run: cd grimoire-kit/apps/grimoire-game && npm run build

      - name: Run tests with coverage
        if: steps.game_scope.outputs.run_check == 'true'
        run: cd grimoire-kit/apps/grimoire-game && npm run test:coverage

      - name: Run cockpit proof
        if: steps.game_scope.outputs.run_check == 'true'
        run: cd grimoire-kit/apps/grimoire-game && npm run cockpit:verify

      - name: Verify npm package payload
        if: steps.game_scope.outputs.run_check == 'true'
        run: cd grimoire-kit/apps/grimoire-game && npm run pack:verify

      - name: Create npm package artifact
        if: steps.game_scope.outputs.run_check == 'true'
        run: cd grimoire-kit/apps/grimoire-game && npm run pack:artifact

      - name: Upload runtime artifacts
        if: steps.game_scope.outputs.run_check == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: grimoire-game-runtime-artifacts
          path: |
            grimoire-kit/apps/grimoire-game/dist
            grimoire-kit/apps/grimoire-game/coverage
            grimoire-kit/apps/grimoire-game/.release

      - name: Upload coverage reports to Codecov
        if: steps.game_scope.outputs.run_check == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: grimoire-kit/apps/grimoire-game/coverage/lcov.info
          flags: grimoire-game
          name: grimoire-game-node22

      - name: Skip notice
        if: steps.game_scope.outputs.run_check != 'true'
        run: echo "grimoire-game absent dans ce checkout, checks Node skips."
