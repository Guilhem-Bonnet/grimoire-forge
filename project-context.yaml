# BMAD Custom Kit — Project Context (meta-projet)
# Workspace dédié à la planification et l'amélioration du kit

project:
  name: "grimoire"
  description: "Meta-projet d'auto-amélioration de grimoire-kit"
  type: "meta"
  metaphor: "grimoire"                   # Le livre de sorts où l'on invoque et perfectionne les agents
  stack: ["python", "yaml", "markdown"]
  repos:
    - name: "grimoire"
      path: "."
      default_branch: "main"
    - name: "grimoire-kit"
      path: "./grimoire-kit"
      default_branch: "main"

user:
  name: "Guilhem"
  language: "Français"
  document_language: "Français"
  skill_level: "expert"

memory:
  backend: "qdrant-local"
  collection_prefix: "bmad_meta"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  # qdrant_data stocké dans framework/memory/qdrant_data/ par défaut

agents:
  archetype: "meta"
  custom_agents: []

installed_archetypes: ["meta"]
