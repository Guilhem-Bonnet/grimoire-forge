# BMAD Custom Kit — Project Context (meta-projet)
# Workspace dédié à la planification et l'amélioration du kit

project:
  name: "grimoire-forge"
  description: "Moteur de création de projets agentiques piloté par BMAD"
  type: "meta"
  metaphor: "forge"                      # Atelier de création et d'assemblage de projets agentiques
  stack: ["python", "yaml", "markdown"]
  repos:
    - name: "grimoire"
      path: "."
      default_branch: "main"
    - name: "grimoire-kit"
      path: "./grimoire-kit"
      default_branch: "main"

user:
  name: "Guilhem"
  language: "Français"
  document_language: "Français"
  skill_level: "expert"

memory:
  backend: "qdrant-local"
  collection_prefix: "grimoire_forge_meta"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  # qdrant_data stocké dans framework/memory/qdrant_data/ par défaut

agents:
  archetype: "meta"
  custom_agents: []

installed_archetypes: ["meta"]
